services:
  # 1. 프론트엔드 (Flutter Web 정적 파일 서빙 전용)
  frontend:
    build: ./frontend
    container_name: samantha_frontend
    ports:
      - "127.0.0.1:8080:80" # 외부 노출을 막고 호스트 내부 8080 포트와 연결
    depends_on:
      - backend
    networks:
      - samantha-network
    restart: unless-stopped

  # 2. 백엔드 (FastAPI - AI Engine)
  backend:
    build: ./backend
    container_name: samantha_backend
    ports:
      - "127.0.0.1:8000:8000" # 외부 직접 접근 차단
    volumes:
      - ./backend:/app
      - ./backend/certs:/app/certs
    env_file:
      - ./backend/.env
    depends_on:
      - postgres:
        condition: service_healthy

  # 3. PostgreSQL with pgvector extension (RAG 필수)
  postgres:
    image: pgvector/pgvector:pg16
    container_name: samantha_postgres
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-samantha_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-samantha_password}
      POSTGRES_DB: ${POSTGRES_DB:-samantha_db}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "pg_isready -U ${POSTGRES_USER:-samantha_user} -d ${POSTGRES_DB:-samantha_db}",
        ]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - samantha-network
    restart: unless-stopped

  # 4. 객체 스토리지 (MinIO)
  minio:
    image: minio/minio
    container_name: samantha-minio
    restart: always
    command: server /data --console-address ":9001"
    ports:
      - "9005:9000"
      - "9001:9001"
    environment:
      - MINIO_ROOT_USER=minioadmin
      - MINIO_ROOT_PASSWORD=minioadmin
    volumes:
      - minio_data:/data
    networks:
      - samantha-network

  # 5. 자동 버킷 생성 설정 (MinIO Client)
  minio-init:
    image: minio/mc
    container_name: samantha-minio-init
    depends_on:
      - minio
    entrypoint: >
      /bin/sh -c "
      count=0;
      until (/usr/bin/mc alias set myminio http://minio:9000 minioadmin minioadmin) || [ $$count -eq 30 ]; do
        echo 'Waiting for MinIO (attempt $$count)...';
        sleep 1;
        count=$$((count + 1));
      done;
      if [ $$count -eq 30 ]; then
        echo '❌ MinIO connection timed out';
        exit 1;
      fi;
      /usr/bin/mc mb myminio/samantha-bucket || true;
      "
    networks:
      - samantha-network

volumes:
  postgres_data:
    name: samantha_postgres_data
  minio_data:

networks:
  samantha-network:
    driver: bridge
