# 1. 일반 접속 시 HTTPS(8443 포트)로 강제 이동
server {
    listen 80;
    server_name 178.128.54.98;
    return 301 https://$server_name:8443$request_uri;
}

# 2. 대망의 HTTPS 서버 설정 (이걸 타야 암호화 저장소가 안 뻗습니다!)
server {
    listen 443 ssl;
    server_name 178.128.54.98;
    
    root /usr/share/nginx/html;
    index index.html;

    # 이미 만들어두신 가짜 인증서 연결
    ssl_certificate /etc/nginx/certs/localhost.pem;
    ssl_certificate_key /etc/nginx/certs/localhost-key.pem;
    
    ssl_protocols TLSv1.2 TLSv1.3;

    # 백엔드 API 프록시 (핵심: https가 아니라 http입니다)
    location /api/ {
        proxy_pass https://samantha_backend:8000/api/;
        
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # 백엔드 헬스 체크
    location = /health {
        proxy_pass https://samantha_backend:8000/health;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    # WebSocket 프록시 (Socket.IO용)
    location /ws/ {
        proxy_pass https://samantha_backend:8000/ws/;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
    }

    # Flutter SPA 라우팅
    location / {
        try_files $uri $uri/ /index.html;
    }

    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
}

